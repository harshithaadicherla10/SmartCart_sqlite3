<!DOCTYPE html>
<html>
<head>
    <title>Update Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    .nav {
      background-color: #3e40e4;
    }

    .dashboard {
      text-decoration: none;
    }

    .dashboard:hover {
      text-decoration: underline;
    }

    .cart {
      text-decoration: none;
    }

    .cart:hover {
      text-decoration: underline;
    }

    .order {
      text-decoration: none;
    }

    .order:hover {
      text-decoration: underline;
    }

    .amazon-footer {
      background-color: #3e40e4;
    }

    footer h4 {
      font-size: 0.8rem;
      margin-bottom: 0;
      padding: 8px;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .content {
      padding-top: 40px;
      padding-right: 20px;
      padding-left: 20px;
    }

    .main-wrapper {
      flex: 1;
      display: flex;
    }

    .hero-section {
      flex: 1;
      background: url('/static/images/background-img.jpg') center center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .title::after{
        content: "";
            width: 60px;
            height: 3px;
            background: #764ba2;
            display: block;
            margin: 8px auto 0;
            border-radius: 5px;
    }

   img{
        width: 250px;
        height: 250px;
    }

    .footer {
      background: #3f3fdc;
      color: white;
      padding: 15px 0;
      text-align: center;
    }
    
    /* Remove border */
.navbar-toggler {
    border: none !important;
    transition: background-color 0.3s ease;
    padding: 6px 10px;
    border-radius: 6px;   /* Slight rounded look */
}

/* Remove blue outline */
.navbar-toggler:focus {
    outline: none !important;
    box-shadow: none !important;
}

/* Default icon color (dark) */
.custom-toggler .navbar-toggler-icon {
    filter: invert(28%) sepia(23%) saturate(800%) hue-rotate(100deg);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%232d6a4f' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
}

/* 🔥 When menu is open → background green */
.custom-toggler[aria-expanded="true"] {
    background-color: rgb(136, 157, 218);
}

/* When open → make icon white for contrast */
.custom-toggler[aria-expanded="true"] .navbar-toggler-icon {
    filter: brightness(0) invert(1);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%231b4332' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
}
  </style>
</head>
<body>
  
<!-- =============== NAVBAR ========================-->
<nav class="navbar navbar-expand-lg amazon-top-nav fixed-top">
        <div class="container-fluid px-4">

            <!-- Logo -->
            <a class="navbar-brand fw-bold text-white" href="/admin/item-list">
                SmartCart
            </a>

            <!-- Toggle Button (Mobile) -->
            <button class="navbar-toggler custom-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
        aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
</button>

            <!-- Collapsible Content -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">

                <ul class="navbar-nav align-items-lg-center gap-lg-3 mt-3 mt-lg-0">
                    <!-- Dashboard -->
                    <li class="nav-item">
                        <a href="/admin-dashboard" class="nav-link text-white fw-semibold">
                            Dashboard
                        </a>
                    </li>
                    <!-- Products -->
                    <li class="nav-item">
                        <a href="/admin/item-list" class="nav-link text-white fw-semibold">
                            <i class="bi bi-box-seam-fill"></i> Products
                        </a>
                    </li>

                    <!-- Orders -->
                    <li class="nav-item">
                        <a href="/admin/add-item" class="nav-link text-white">
                            <i class="bi bi-cart-plus-fill"></i> Add Product
                        </a>
                    </li>

                    <!-- Logout -->
                    <li class="nav-item">
                        <a href="/admin-logout" class="btn btn-sm btn-danger rounded-2 ms-lg-2">
                            Logout
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    
<!-- ======================= Main ==================== -->
 <main class="content">  
<div class="update-wrapper">
    <div class="update-card">

        <h2>Update Product</h2>

        <!-- Flash Messages -->
        <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        </div>

        <form method="POST"
              action="/admin/update-item/{{ product.product_id }}"
              enctype="multipart/form-data">

            <label>Product Name:</label>
            <input type="text" name="name"
                   value="{{ product.name }}" required>

            <label>Description:</label>
            <textarea name="description" required>{{ product.description }}</textarea>

            <label>Category:</label>
            <input type="text" name="category"
                   value="{{ product.category }}" required>

            <label>Price:</label>
            <input type="number" step="0.01"
                   name="price"
                   value="{{ product.price }}" required>

            <label>Old Image:</label>
            <div class="old-image-preview">
                <img src="{{ url_for('static', filename='uploads/product_images/' ~ product.image) }}">
            </div>

            <label>Choose New Image (Optional):</label>
            <input type="file" name="image" accept="image/*">

            <button type="submit" class="update-btn">
                Update Product
            </button>

        </form>

        <a href="/admin/item-list" class="back-link">
            ← Back to Product List
        </a>

    </div>
</div>
</main>

<!-- Footer section -->

    <footer class="footer">
        © 2026 Harshitha Adicherla | All Rights Reserved  
    </footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
