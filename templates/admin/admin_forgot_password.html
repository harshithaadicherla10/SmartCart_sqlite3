<!DOCTYPE html>
<html>
<head>
    <title>Admin Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .nav {
      background-color: #3e40e4;
    }

    .dashboard {
      text-decoration: none;
    }

    .dashboard:hover {
      text-decoration: underline;
    }

    .cart {
      text-decoration: none;
    }

    .cart:hover {
      text-decoration: underline;
    }

    .order {
      text-decoration: none;
    }

    .order:hover {
      text-decoration: underline;
    }

    .amazon-footer {
      background-color: #3e40e4;
    }

    footer h4 {
      font-size: 0.8rem;
      margin-bottom: 0;
      padding: 8px;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      display: flex;
    }

    .main-wrapper {
      flex: 1;
      display: flex;
    }
    /* =========================
   HERO BACKGROUND
========================= */
.hero-section {
    flex: 1;
    background: url('/static/images/background-img.jpg') center center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 15px;
}

/* ===== ADMIN CENTER PAGES ===== */
.admin-center {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Center main content area */
.admin-center .main-content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FOOTER */
    .footer {
      background: #3f3fdc;
      color: white;
    }

        .btn{
            transition: 0.3s;
        }
        .btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .back_link{
            text-decoration: none;
        }
        .back_link:hover{
            text-decoration: underline;
        }

        /* Remove border */
.navbar-toggler {
    border: none !important;
    transition: background-color 0.3s ease;
    padding: 6px 10px;
    border-radius: 6px;   /* Slight rounded look */
}

/* Remove blue outline */
.navbar-toggler:focus {
    outline: none !important;
    box-shadow: none !important;
}

/* Default icon color (dark) */
.custom-toggler .navbar-toggler-icon {
    filter: invert(28%) sepia(23%) saturate(800%) hue-rotate(100deg);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%232d6a4f' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
}

/* 🔥 When menu is open → background green */
.custom-toggler[aria-expanded="true"] {
    background-color: rgb(136, 157, 218);
}

/* When open → make icon white for contrast */
.custom-toggler[aria-expanded="true"] .navbar-toggler-icon {
    filter: brightness(0) invert(1);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%231b4332' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
}
    </style>
</head>
<body class="admin-center">
 
  <!-- =============== NAVBAR ========================-->
  <nav class="nav navbar navbar-expand-lg amazon-top-nav">
    <div class="container-fluid px-4">

      <!-- Logo -->
      <a class="navbar-brand fw-bold text-white" href="/admin/item-list">
        SmartCart
      </a>

      <!-- Toggle Button (Mobile) -->
      <button class="navbar-toggler custom-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
        aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
</button>
      <!-- Collapsible Content -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarContent">

        <ul class="navbar-nav align-items-lg-center gap-lg-3 mt-3 mt-lg-0"> 
          <!-- Dashboard -->
                    <li class="nav-item">
                        <a href="/admin-login" class="nav-link text-white fw-semibold">
                            Login
                        </a>
                    </li>
          <!-- Products -->
          <li class="nav-item">
            <a href="/admin-register" class="nav-link text-white fw-semibold">
              Register
            </a>
          </li>

        </ul> 

      </div>
    </div>
  </nav>

  <!-- ================ MAIN CONTENT =======================  -->
<div class="hero-section">
       

<div class="container d-flex justify-content-center align-items-center ">
    <div class="card shadow p-4" style="width: 400px;">
        <h4 class="text-center mb-3">Forgot Password</h4>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter Your email...">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Send OTP
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/admin-login" class="back_link">Back to Login</a>
        </div>
    </div>
</div>
</div>


<!-- Footer section -->

  <footer class="footer text-center py-3">
    © 2026 Harshitha Adicherla | All Rights Reserved
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>


</body>

</html>
